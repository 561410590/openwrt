name: NRadio OpenWrt 25.12

on:
  workflow_dispatch:
  push:
    branches:
      - codex/openwrt-25.12-nradio-build
    paths:
      - .github/workflows/nradio-openwrt-25.12.yml

permissions:
  contents: read

concurrency:
  group: nradio-openwrt-25.12-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.device }}
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - device: nradio_c5800-688
            dts: mt7981-nradio-c5800-688
          - device: nradio_c8-688
            dts: mt7981-nradio-c8-688
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 8G
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Checkout official OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: openwrt-25.12
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            bison build-essential ccache clang curl device-tree-compiler file \
            flex g++ g++-multilib gawk gcc-multilib gettext git libelf-dev \
            libncurses-dev libssl-dev patch pkgconf python3 python3-pip \
            python3-setuptools rsync subversion swig unzip wget xxd zlib1g-dev

      - name: Restore dl cache
        uses: actions/cache/restore@v4
        with:
          path: dl
          key: ${{ runner.os }}-openwrt25.12-dl-${{ matrix.device }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-openwrt25.12-dl-${{ matrix.device }}-
            ${{ runner.os }}-openwrt25.12-dl-

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-openwrt25.12-ccache-${{ matrix.device }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-openwrt25.12-ccache-${{ matrix.device }}-
            ${{ runner.os }}-openwrt25.12-ccache-

      - name: Overlay NRadio device files
        env:
          OVERLAY_BASE: https://raw.githubusercontent.com/561410590/openwrt/main/target/linux/mediatek
        run: |
          set -euxo pipefail
          mkdir -p target/linux/mediatek/dts
          for file in \
            mt7981-nradio-common.dtsi \
            mt7981-nradio-c5800-688-emmc.dtsi \
            mt7981-nradio-c5800-688.dts \
            mt7981-nradio-c8-688-emmc.dtsi \
            mt7981-nradio-c8-688.dts
          do
            curl -fsSL "${OVERLAY_BASE}/dts/${file}" -o "target/linux/mediatek/dts/${file}"
          done

          python3 - <<'PY'
          from pathlib import Path

          def drop_block(path: Path, marker: str) -> None:
              text = path.read_text()
              lines = text.splitlines()
              output = []
              skipping = False
              depth = 0
              removed = False

              for line in lines:
                  if not skipping and line.lstrip().startswith(marker):
                      skipping = True
                      removed = True
                      depth = line.count("{") - line.count("}")
                      continue

                  if skipping:
                      depth += line.count("{") - line.count("}")
                      if depth <= 0:
                          skipping = False
                          depth = 0
                      continue

                  output.append(line)

              if removed:
                  path.write_text("\n".join(output) + "\n")

          def append_block(path: Path, marker: str, block: str) -> None:
              text = path.read_text()
              if marker in text:
                  return
              path.write_text(text.rstrip() + "\n\n" + block.strip() + "\n")

          def replace_once(path: Path, old: str, new: str) -> None:
              text = path.read_text()
              if new in text:
                  return
              if old not in text:
                  raise SystemExit(f"expected anchor not found in {path}: {old[:80]!r}")
              path.write_text(text.replace(old, new, 1))

          common = Path("target/linux/mediatek/dts/mt7981-nradio-common.dtsi")
          common_text = common.read_text()
          if '#include "mt7981.dtsi"' in common_text:
              common_text = common_text.replace('#include "mt7981.dtsi"', '#include "mt7981b.dtsi"', 1)

          header_lines = []
          if "dt-bindings/gpio/gpio.h" not in common_text:
              header_lines.append('#include <dt-bindings/gpio/gpio.h>')
          if "dt-bindings/input/input.h" not in common_text:
              header_lines.append('#include <dt-bindings/input/input.h>')

          if header_lines:
              common_text = "\n".join(header_lines) + "\n\n" + common_text

          common.write_text(common_text)

          for name in (
              "mt7981-nradio-c5800-688-emmc.dtsi",
              "mt7981-nradio-c8-688-emmc.dtsi",
          ):
              path = Path("target/linux/mediatek/dts") / name
              drop_block(path, "&hnat")
              append_block(
                  path,
                  "block-partition-factory",
                  """
          &mmc0 {
          	#address-cells = <1>;
          	#size-cells = <0>;

          	card@0 {
          		compatible = "mmc-card";
          		reg = <0>;

          		block {
          			compatible = "block-device";

          			partitions {
          				block-partition-factory {
          					partname = "factory";

          					nvmem-layout {
          						compatible = "fixed-layout";
          						#address-cells = <1>;
          						#size-cells = <1>;

          						eeprom_factory_0: eeprom@0 {
          							reg = <0x0 0x1000>;
          						};
          					};
          				};
          			};
          		};
          	};
          };

          &wifi {
          	nvmem-cells = <&eeprom_factory_0>;
          	nvmem-cell-names = "eeprom";
          	status = "okay";
          };
                  """,
              )

          filogic = Path("target/linux/mediatek/image/filogic.mk")
          data = filogic.read_text()
          if "define Device/nradio_c5800-688" in data and "define Device/nradio_c8-688" in data:
              raise SystemExit(0)

          anchor = """define Device/nradio_c8-668gl
            DEVICE_VENDOR := NRadio
            DEVICE_MODEL := C8-668GL
            DEVICE_DTS := mt7981b-nradio-c8-668gl
            DEVICE_DTS_DIR := ../dts
            DEVICE_PACKAGES := kmod-mt7915e kmod-mt7981-firmware mt7981-wo-firmware \\
          \tkmod-usb-serial-option kmod-usb-net-cdc-ether kmod-usb-net-qmi-wwan \\
          \tkmod-usb3
            IMAGE_SIZE := 131072k
            IMAGE/sysupgrade.bin := sysupgrade-tar | append-metadata | check-size
          endef
          TARGET_DEVICES += nradio_c8-668gl"""

          block = """

          define Device/nradio_c5800-688
            DEVICE_VENDOR := NRadio
            DEVICE_MODEL := C5800-688
            DEVICE_DTS := mt7981-nradio-c5800-688
            DEVICE_DTS_DIR := ../dts
            SUPPORTED_DEVICES += HCMT7981-emmc
            DEVICE_PACKAGES := kmod-mt7915e kmod-mt7981-firmware mt7981-wo-firmware \\
          \tluci uhttpd uhttpd-mod-ubus rpcd rpcd-mod-uci \\
          \tkmod-usb-acm kmod-usb-net-cdc-ether kmod-usb-net-cdc-mbim \\
          \tkmod-usb-net-cdc-ncm kmod-usb-net-huawei-cdc-ncm kmod-usb-net-qmi-wwan \\
          \tkmod-usb-net-rndis kmod-usb-net-sierrawireless kmod-usb-serial \\
          \tkmod-usb-serial-option kmod-usb-serial-qualcomm kmod-usb-serial-wwan \\
          \tkmod-usb-wdm kmod-usb3
            IMAGE_SIZE := 131072k
            IMAGE/sysupgrade.bin := sysupgrade-tar | append-metadata | check-size
          endef
          TARGET_DEVICES += nradio_c5800-688

          define Device/nradio_c8-688
            DEVICE_VENDOR := NRadio
            DEVICE_MODEL := C8-688
            DEVICE_DTS := mt7981-nradio-c8-688
            DEVICE_DTS_DIR := ../dts
            SUPPORTED_DEVICES += HCMT7981-688-emmc
            DEVICE_PACKAGES := kmod-mt7915e kmod-mt7981-firmware mt7981-wo-firmware \\
          \tluci uhttpd uhttpd-mod-ubus rpcd rpcd-mod-uci \\
          \tkmod-usb-acm kmod-usb-net-cdc-ether kmod-usb-net-cdc-mbim \\
          \tkmod-usb-net-cdc-ncm kmod-usb-net-huawei-cdc-ncm kmod-usb-net-qmi-wwan \\
          \tkmod-usb-net-rndis kmod-usb-net-sierrawireless kmod-usb-serial \\
          \tkmod-usb-serial-option kmod-usb-serial-qualcomm kmod-usb-serial-wwan \\
          \tkmod-usb-wdm kmod-usb3
            IMAGE_SIZE := 131072k
            IMAGE/sysupgrade.bin := sysupgrade-tar | append-metadata | check-size
          endef
          TARGET_DEVICES += nradio_c8-688
          """

          if anchor not in data:
              raise SystemExit("nradio_c8-668gl anchor block not found in filogic.mk")

          filogic.write_text(data.replace(anchor, anchor + block))

          board02 = Path("target/linux/mediatek/filogic/base-files/etc/board.d/02_network")
          replace_once(
              board02,
              """\tcase $board in
\tabt,asr3000|\\""",
              """\tcase $board in
\tnradio,c5800-688|\\
\tnradio_c5800-688|\\
\thcmt7981-emmc|\\
\tHCMT7981-emmc|\\
\tnradio,c8-688|\\
\tnradio_c8-688|\\
\thcmt7981-688-emmc|\\
\tHCMT7981-688-emmc)
\t\tucidef_set_interface "lan" device "lan1 lan2 lan3" protocol static ipaddr "192.168.66.1" netmask "255.255.255.0"
\t\tucidef_set_interface_wan eth1 dhcp
\t\t;;
\tabt,asr3000|\\""",
          )

          board04 = Path("target/linux/mediatek/filogic/base-files/etc/board.d/04_defaults")
          replace_once(
              board04,
              """case $board in
\topenwrt,one)""",
              """case $board in
\tnradio,c5800-688|\\
\tnradio_c5800-688|\\
\thcmt7981-emmc|\\
\tHCMT7981-emmc|\\
\tnradio,c8-688|\\
\tnradio_c8-688|\\
\thcmt7981-688-emmc|\\
\tHCMT7981-688-emmc)
\t\tuci -q batch <<-'EOF_INNER'
\t\t\tset network.lan='interface'
\t\t\tset network.lan.device='br-lan'
\t\t\tset network.lan.proto='static'
\t\t\tset network.lan.ipaddr='192.168.66.1'
\t\t\tset network.lan.netmask='255.255.255.0'
\t\t\tdelete network.lan.ifname

\t\t\tdelete network.@device[0]
\t\t\tadd network device
\t\t\tset network.@device[-1].name='br-lan'
\t\t\tset network.@device[-1].type='bridge'
\t\t\tadd_list network.@device[-1].ports='lan1'
\t\t\tadd_list network.@device[-1].ports='lan2'
\t\t\tadd_list network.@device[-1].ports='lan3'

\t\t\tset network.wan='interface'
\t\t\tset network.wan.proto='dhcp'
\t\t\tset network.wan.device='eth1'
\t\t\tset network.wan6='interface'
\t\t\tset network.wan6.proto='dhcpv6'
\t\t\tset network.wan6.device='eth1'
\t\t\tdelete network.wan1
\t\t\tdelete network.wan1v6

\t\t\tset network.BLUE4WAN='interface'
\t\t\tset network.BLUE4WAN.proto='dhcp'
\t\t\tset network.BLUE4WAN.device='BLUE4'
\t\t\tset network.BLUE4WANV6='interface'
\t\t\tset network.BLUE4WANV6.proto='dhcpv6'
\t\t\tset network.BLUE4WANV6.device='BLUE4'
\t\tEOF_INNER
\t\tuci commit network
\t\t;;
\topenwrt,one)""",
          )

          platform = Path("target/linux/mediatek/filogic/base-files/lib/upgrade/platform.sh")
          replace_once(
              platform,
              """\tnradio,c8-668gl)""",
              """\tnradio,c8-668gl|\\
\tnradio,c5800-688|\\
\tnradio_c5800-688|\\
\tnradio,c8-688|\\
\tnradio_c8-688|\\
\thcmt7981-emmc|\\
\tHCMT7981-emmc|\\
\thcmt7981-688-emmc|\\
\tHCMT7981-688-emmc)""",
          )
          replace_once(
              platform,
              """\tcreatlentem,clt-r30b1|\\
\tcreatlentem,clt-r30b1-112m|\\
\tnradio,c8-668gl)""",
              """\tcreatlentem,clt-r30b1|\\
\tcreatlentem,clt-r30b1-112m|\\
\tnradio,c8-668gl|\\
\tnradio,c5800-688|\\
\tnradio_c5800-688|\\
\tnradio,c8-688|\\
\tnradio_c8-688|\\
\thcmt7981-emmc|\\
\tHCMT7981-emmc|\\
\thcmt7981-688-emmc|\\
\tHCMT7981-688-emmc)""",
          )
          replace_once(
              platform,
              """\tjdcloud,re-cp-03|\\
\tnradio,c8-668gl|\\
\tsmartrg,sdg-8612|\\""",
              """\tjdcloud,re-cp-03|\\
\tnradio,c8-668gl|\\
\tnradio,c5800-688|\\
\tnradio_c5800-688|\\
\tnradio,c8-688|\\
\tnradio_c8-688|\\
\thcmt7981-emmc|\\
\tHCMT7981-emmc|\\
\thcmt7981-688-emmc|\\
\tHCMT7981-688-emmc|\\
\tsmartrg,sdg-8612|\\""",
          )
          PY

      - name: Update feeds
        run: |
          set -euxo pipefail
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure build
        run: |
          set -euxo pipefail
          cat > .config <<EOF
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_${{ matrix.device }}=y
          CONFIG_CCACHE=y
          EOF
          ccache -M "${CCACHE_MAXSIZE}" || true
          make defconfig
          ccache -s || true

      - name: Download sources
        run: |
          set -euxo pipefail
          NPROC="$(nproc)"
          echo "Using ${NPROC} threads for download"
          make download -j"${NPROC}"

      - name: Build firmware
        run: |
          set -euxo pipefail
          NPROC="$(nproc)"
          echo "Using ${NPROC} threads for build"
          make -j"${NPROC}" V=s 2>&1 | tee build.log

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-25.12-logs-${{ matrix.device }}
          retention-days: 14
          if-no-files-found: warn
          include-hidden-files: true
          path: |
            .config
            build.log
            bin/targets/mediatek/filogic/*buildinfo
            bin/targets/mediatek/filogic/sha256sums
            logs/**
            tmp/**/*.log
            tmp/**/*.txt

      - name: Collect firmware
        if: success()
        run: |
          set -euxo pipefail
          mkdir -p artifact metadata
          python3 - <<'PY'
          from pathlib import Path

          firmware_dir = Path("bin/targets/mediatek/filogic")
          device = "${{ matrix.device }}"
          dts = "${{ matrix.dts }}"
          image_suffixes = (".bin", ".img", ".img.gz", ".itb", ".tar")

          image_files = sorted(
              p for p in firmware_dir.iterdir()
              if p.is_file()
              and (device in p.name or dts in p.name)
              and p.name.endswith(image_suffixes)
              and not p.name.endswith((".sha256", ".manifest"))
          )
          if not image_files:
              print(f"No firmware images found for {device} / {dts} in {firmware_dir}")
              for p in sorted(firmware_dir.glob("*")):
                  print(p)
              raise SystemExit(1)

          sysupgrade = next((p for p in image_files if "sysupgrade" in p.name), image_files[0])
          artifact = Path("artifact")
          lines = []

          for src in image_files:
              dst = artifact / src.name
              dst.write_bytes(src.read_bytes())
              lines.append(str(src))

          renamed = artifact / f"{device}-sysupgrade.bin"
          generic = artifact / "sysupgrade.bin"
          renamed.write_bytes(sysupgrade.read_bytes())
          generic.write_bytes(sysupgrade.read_bytes())
          lines.extend([str(sysupgrade), str(sysupgrade)])
          (artifact / "firmware-list.txt").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

          sha256sum artifact/* > "artifact/${{ matrix.device }}-sha256sums.txt"

          find bin/targets/mediatek/filogic -maxdepth 1 -type f \
            \( -name "*.manifest" -o -name "*.buildinfo" -o -name "profiles.json" -o -name "sha256sums" \) \
            -exec cp -f {} metadata/ \; || true

          ls -lah artifact
          ls -lah metadata

      - name: Upload firmware artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.device }}
          path: artifact
          if-no-files-found: error
          retention-days: 14

      - name: Upload metadata artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: metadata-${{ matrix.device }}
          path: metadata
          if-no-files-found: error
          retention-days: 14

      - name: Save dl cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: dl
          key: ${{ runner.os }}-openwrt25.12-dl-${{ matrix.device }}-${{ github.run_id }}

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-openwrt25.12-ccache-${{ matrix.device }}-${{ github.run_id }}
